name: Build_Test

on:
  pull_request:
    branches:
      - main

jobs:
  # ─── JOB 1: Dependency + Lint ─────────────────
  install_and_lint:
    name: Install & Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npx html-validate "src/**/*.html"

      - name: Lint CSS
        run: npx stylelint "src/**/*.css" --config '{"rules":{"no-duplicate-selectors":true,"color-no-invalid-hex":true}}'

      - name: Lint JavaScript
        run: npx eslint "src/**/*.js" --env browser --rule '{"no-undef":0}'


  # ─── JOB 2: Test + Build ───────────────────
  test_and_build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: install_and_lint

    steps:
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run validation tests
        run: node tests/validate.test.js

      - name: Build project (copy to dist/)
        run: |
          mkdir -p dist
          cp -r src/* dist/
          echo "Build completed at $(date)" > dist/BUILD_INFO.txt
          echo "Branch : ${{ github.head_ref }}" >> dist/BUILD_INFO.txt
          echo "Commit : ${{ github.sha }}" >> dist/BUILD_INFO.txt
          echo "Run ID : ${{ github.run_id }}" >> dist/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inner-world-ci-build
          path: dist/
          retention-days: 3

      - name: Write test summary
        if: always()
        run: |
          echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check       | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| HTML lint   | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS lint    | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| JS lint     | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation  | Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Build dist/ | Pass |" >> $GITHUB_STEP_SUMMARY