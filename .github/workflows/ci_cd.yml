name: Frontend CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build_test:
    if: github.event_name == 'pull_request'
    name: Build_Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        id: html
        run: npm run lint:html

      - name: Validate CSS
        id: css
        run: npm run lint:css

      - name: Validate JavaScript
        id: js
        run: npm run lint:js

      - name: Run frontend checks
        id: tests
        run: npm test

      - name: Create preview build
        id: build
        run: npm run build

      - name: Upload preview artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-dist
          path: dist/
          retention-days: 3

      - name: Write CI summary
        if: always()
        run: |
          echo "## Build_Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| HTML validation | ${{ steps.html.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS validation | ${{ steps.css.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript validation | ${{ steps.js.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend checks | ${{ steps.tests.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview build | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY

  build_deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build_Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production package
        run: npm run build

      - name: Simulate deployment
        env:
          DEPLOY_ENV: production-simulated
        run: npm run deploy:simulate

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-package
          path: |
            dist/
            release/
          retention-days: 5

      - name: Print deployment log
        run: cat release/DEPLOY_REPORT.txt
