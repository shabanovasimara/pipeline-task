name: Build Test

on:
  pull_request:
    branches:
      - main

jobs:
  install_and_lint:
    name: Install & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

  test_and_build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: install_and_lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run validation tests
        id: validation
        run: npm test

      - name: Build project
        id: build
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: inner-world-ci-build
          path: dist/
          retention-days: 3

      - name: Write test summary
        if: always()
        run: |
          echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ steps.validation.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build dist/ | ${{ steps.build.outcome }} |" >> $GITHUB_STEP_SUMMARY
